apiVersion: apps/v1
kind: Deployment
metadata:
  name: otpreset-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otpreset-app

  template:
    metadata:
      labels:
        app: otpreset-app

    spec:
      containers:
      - name: otpreset-app
        image: akshayguptha25/otpreset-app:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: otpreset-service

spec:
  type: NodePort

  selector:
    app: otpreset-app

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30009